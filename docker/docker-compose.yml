# ============================================================
# Social Buster - Docker Compose
# Run with: docker compose up --build
# ============================================================

services:

  # ---- Node.js Backend API --------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: social-buster-backend
    ports:
      - "3001:3000"
    volumes:
      # Mount source for hot-reload in development
      - ../backend:/app
      # Keep node_modules inside the container (don't overwrite with host)
      - /app/node_modules
      # Mount frontend so Express can serve the static files
      - ../frontend:/frontend
      # Temp directory for FFmpeg video processing
      - ffmpeg-temp:/tmp/social-buster
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      # n8n removed — DM automation uses direct Meta Graph API calls
      - FFMPEG_TEMP_DIR=/tmp/social-buster/videos
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - social-buster-net
    restart: unless-stopped

  # ---- Redis Cache ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: social-buster-redis
    # Internal only - not exposed to the internet
    # Remove the ports section below in production
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # Enable AOF persistence so cache survives container restarts
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - social-buster-net
    restart: unless-stopped

  # n8n removed (2026-03-20) — DM automation now uses direct Meta Graph API calls.
  # No external workflow engine needed. See backend/services/messagingService.js.

# ============================================================
# Networks
# All services communicate on this private bridge network.
# Nothing is exposed directly to the internet except via
# the backend port (which will sit behind nginx in production).
# ============================================================
networks:
  social-buster-net:
    driver: bridge

# ============================================================
# Volumes - Persistent storage that survives container restarts
# ============================================================
volumes:
  redis-data:
    driver: local
  ffmpeg-temp:
    driver: local
