# ============================================================
# Social Buster - Docker Compose
# Run with: docker compose up --build
# ============================================================

services:

  # ---- Node.js Backend API --------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: social-buster-backend
    ports:
      - "3001:3000"
    volumes:
      # Mount source for hot-reload in development
      - ../backend:/app
      # Keep node_modules inside the container (don't overwrite with host)
      - /app/node_modules
      # Mount frontend so Express can serve the static files
      - ../frontend:/frontend
      # Temp directory for FFmpeg video processing
      - ffmpeg-temp:/tmp/social-buster
    env_file:
      - ../backend/.env
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - N8N_BASE_URL=http://n8n:5678
      - FFMPEG_TEMP_DIR=/tmp/social-buster/videos
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - social-buster-net
    restart: unless-stopped

  # ---- Redis Cache ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: social-buster-redis
    # Internal only - not exposed to the internet
    # Remove the ports section below in production
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # Enable AOF persistence so cache survives container restarts
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - social-buster-net
    restart: unless-stopped

  # ---- n8n Workflow Automation ----------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: social-buster-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      # Change this password immediately in production
      - N8N_BASIC_AUTH_PASSWORD=changeme_n8n
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      # Allow n8n to call our backend
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - social-buster-net
    restart: unless-stopped

# ============================================================
# Networks
# All services communicate on this private bridge network.
# Nothing is exposed directly to the internet except via
# the backend port (which will sit behind nginx in production).
# ============================================================
networks:
  social-buster-net:
    driver: bridge

# ============================================================
# Volumes - Persistent storage that survives container restarts
# ============================================================
volumes:
  redis-data:
    driver: local
  n8n-data:
    driver: local
  ffmpeg-temp:
    driver: local
